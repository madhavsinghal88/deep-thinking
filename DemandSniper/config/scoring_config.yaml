# Demand Scoring and Priority Configuration
# Tuned for SAP Architect market

# Demand Score Formula Weights
demand_score_formula:
  times_posted_weight: 3        # Higher weight for reposts (shows urgency)
  days_open_divisor: 7          # Faster decay (weekly instead of daily)
  openings_weight: 4            # Multiple openings = high priority

# Priority Classification Thresholds
priority_thresholds:
  high: 30                      # SAP architects with 30+ score = immediate attention
  medium: 15
  low: 0

# Repost Detection
repost_detection_window_days: 45  # Shorter window for faster detection

# Similarity Thresholds for Matching
similarity_thresholds:
  job_title: 80                 # Slightly lower for SAP role variations
  company_name: 95

# Notifications Configuration
notifications:
  enabled: true
  
  # Webhook settings
  webhook:
    url: ""
    headers:
      Content-Type: "application/json"
  
  # Email settings
  email:
    enabled: false
    recipients: []
    subject_template: "[DemandSniper] SAP Alert: {priority} Priority - {company_name}"
  
  # Alert Triggers
  triggers:
    - name: "demand_threshold_crossed"
      enabled: true
      threshold: 30
      description: "Alert when SAP architect demand score crosses high threshold"
    
    - name: "new_high_priority_company"
      enabled: true
      description: "Alert when new company posts SAP architect roles"
    
    - name: "significant_demand_spike"
      enabled: true
      threshold: 15
      description: "Alert on significant increase in SAP hiring"

# Scoring History Settings
scoring:
  track_score_history: true
  auto_update_on_scrape: true

# Top Companies Tracking
top_companies:
  enabled: true
  limit: 100
  min_demand_score: 10
  track_reposting_patterns: true
